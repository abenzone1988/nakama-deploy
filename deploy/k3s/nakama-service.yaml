# 对外暴露 nakama-plus：NodePort，本机可通过 192.168.102.224:30735(7350) / 30751(7351) 访问
apiVersion: v1
kind: Service
metadata:
  name: nakama
  namespace: nakama
spec:
  type: NodePort
  selector:
    app: nakama
  ports:
    - name: grpc
      port: 7349
      targetPort: 7349
      nodePort: 30734
    - name: socket
      port: 7350
      targetPort: 7350
      nodePort: 30735
    - name: console
      port: 7351
      targetPort: 7351
      nodePort: 30751
---
# Headless Service：用于节点间 gossip 互相发现（clusterIP: None 表示不分配 IP，直接解析到 Pod IP）
apiVersion: v1
kind: Service
metadata:
  name: nakama-headless
  namespace: nakama
spec:
  clusterIP: None           # Headless：DNS 解析直接返回所有 Pod 的 IP
  selector:
    app: nakama
  ports:
    - name: gossip
      port: 7335
      targetPort: 7335
